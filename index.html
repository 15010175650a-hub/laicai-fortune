<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>💰 来财 · 2026财运测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#1a0000,#4a0000,#1a0000);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;color:#fff;text-align:center;padding:20px}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;font-size:20px;animation:fall linear infinite;opacity:.6}
@keyframes fall{0%{transform:translateY(-100px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.container{position:relative;z-index:1;max-width:420px;width:100%}
.title{font-size:36px;font-weight:900;margin-bottom:4px;background:linear-gradient(180deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}
.subtitle{font-size:14px;color:#ffcc80;margin-bottom:20px;letter-spacing:2px}
.wheel-wrap{position:relative;width:300px;height:300px;margin:0 auto 24px}
.wheel{width:100%;height:100%;border-radius:50%;background:conic-gradient(#ff4444 0deg 45deg,#ffd700 45deg 90deg,#ff6b35 90deg 135deg,#ff4444 135deg 180deg,#ffd700 180deg 225deg,#ff6b35 225deg 270deg,#ff4444 270deg 315deg,#ffd700 315deg 360deg);position:relative;transition:transform 4s cubic-bezier(.17,.67,.12,.99);box-shadow:0 0 40px rgba(255,215,0,.4),inset 0 0 20px rgba(0,0,0,.3)}
.wheel::after{content:"";position:absolute;top:50%;left:50%;width:40px;height:40px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(0,0,0,.3)}
.wheel-seg{position:absolute;top:50%;left:50%;font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);white-space:nowrap;transform-origin:0 0}
.pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:36px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));z-index:2}
.btn-spin{display:inline-block;padding:14px 50px;font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff2d2d,#ff6b35);border:none;border-radius:50px;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(255,45,45,.5);transition:all .3s}
.btn-spin:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,45,45,.7)}
.btn-spin:active{transform:scale(.96)}
.btn-spin:disabled{opacity:.6;cursor:not-allowed;transform:none}
.result-card{background:rgba(255,255,255,.08);border-radius:20px;padding:24px;margin-top:20px;backdrop-filter:blur(10px);border:1px solid rgba(255,215,0,.2);display:none;animation:fadeInUp .6s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.result-title{font-size:20px;font-weight:700;color:#ffd700;margin-bottom:8px}
.result-desc{font-size:14px;color:#ffcc80;margin-bottom:16px;line-height:1.6}
.qr-section{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,215,0,.15)}
.qr-section p{font-size:13px;color:#ffcc80;margin-bottom:12px}
.qr-section img{width:200px;height:200px;border-radius:12px;border:3px solid rgba(255,215,0,.3)}
.qr-hint{font-size:12px;color:#ff9966;margin-top:8px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.share-btn{display:inline-block;margin-top:16px;padding:10px 30px;font-size:15px;font-weight:600;color:#ffd700;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);border-radius:50px;cursor:pointer;letter-spacing:1px;transition:all .3s}
.share-btn:hover{background:rgba(255,215,0,.25)}
.footer{font-size:11px;color:rgba(255,255,255,.3);margin-top:30px}
</style>
